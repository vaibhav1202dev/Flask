<!DOCTYPE html>
<html>
<head>
    <title>Flask MySQL App</title>
</head>
<body>
    <h1>Messages</h1>

    <form method="POST" action="/add">
        <input type="text" name="message" placeholder="Enter message" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for msg in messages %}
            <li>{{ msg[0] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
